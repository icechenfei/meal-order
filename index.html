<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="点餐">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>今天吃什么</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://yrqparacjtjkgozfwsqj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycXBhcmFjanRqa2dvemZ3c3FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3NTk0OTksImV4cCI6MjA3ODMzNTQ5OX0.jUnvHmo5jxLCQPtqPc7S8O1S3Il8FtqMrfRMN9OsRBc';
    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
  <script src="js/auth.js"></script>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="container">
    <div class="user-bar" id="user-bar">
      <span class="user-email" id="user-email"></span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>

    <!-- 菜单 -->
    <div id="page-menu" class="page active">
      <div class="header">
        <div class="top-bar">
          <span class="user-email-badge" id="menu-user-email"></span>
        </div>
        <div class="header-row">
          <h1>📋 今日菜单</h1>
          <div class="admin-entry" id="admin-entry">
            <a href="admin.html" class="btn-admin">🔧 厨房管理</a>
          </div>
        </div>
        <div class="menu-tabs">
          <button class="menu-tab active" data-tab="menu" onclick="switchMenuTab('menu', this)">📋 菜单</button>
          <button class="menu-tab" data-tab="history" onclick="switchMenuTab('history', this)">📅 历史菜单</button>
        </div>
      </div>
      <div id="menu-content" class="menu-section active">
        <div class="custom-dish-bar">
          <input type="text" id="custom-dish-input" placeholder="✏️ 输入想吃的菜名..." maxlength="50">
          <button class="custom-dish-btn" onclick="addCustomDish()">+ 加入</button>
        </div>
        <div class="search-bar">
          <input type="text" id="recipe-search" placeholder="🔍 搜索菜品..." oninput="onSearchInput()">
        </div>
        <div class="category-bar" id="category-bar"></div>
        <div id="recipe-list"></div>
      </div>
      <div id="history-content" class="menu-section"></div>
    </div>

    <!-- 菜品详情 -->
    <div id="page-detail" class="page">
      <div class="header">
        <div class="top-bar">
          <button class="back-btn" onclick="showPage('page-menu')">← 返回菜单</button>
        </div>
      </div>
      <div id="recipe-detail"></div>
      <div class="order-section">
        <div class="current-recipe" id="order-recipe-name"></div>
        <input type="text" id="order-note" placeholder="备注（少辣、多放盐…）" maxlength="100">
        <button class="btn-order" onclick="addToCart()">🛒 加入已点</button>
      </div>
    </div>

    <!-- 下单成功 -->
    <div id="page-success" class="page">
      <div class="success-content">
        <div class="success-icon">✅</div>
        <h2>点餐成功！</h2>
        <p>已经通知厨师准备啦～</p>
        <button class="btn-primary" onclick="showPage('page-menu')">继续点餐</button>
      </div>
    </div>

    <!-- 已点菜谱（购物车） -->
    <div id="page-cart" class="page">
      <div class="header">
        <div class="top-bar">
          <button class="back-btn" onclick="showPage('page-menu')">← 返回菜单</button>
        </div>
        <h1>🛒 已点菜谱</h1>
      </div>
      <div id="cart-list"></div>
      <div class="cart-bottom">
        <div class="cart-total" id="cart-total"></div>
        <button class="btn-order" onclick="submitCart()">合并提交</button>
      </div>
    </div>

    <!-- 浮动已点按钮 -->
    <div class="cart-float" id="cart-float" onclick="showCart()">
      <span class="cart-float-icon">🛒</span>
      <span class="cart-float-count" id="cart-count">0</span>
    </div>

    <!-- 编辑订单弹窗 -->
    <div id="modal-edit-order" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>修改点餐</h2>
          <button class="close-btn" onclick="closeEditOrderModal()">✕</button>
        </div>
        <input type="hidden" id="edit-order-id">
        <div class="form-group">
          <label>菜品</label>
          <select id="edit-order-recipe" class="form-select" onchange="toggleEditCustom()"></select>
          <input type="text" id="edit-order-custom" placeholder="输入自定义菜名" maxlength="50" style="display:none;margin-top:8px;">
        </div>
        <div class="form-group">
          <label>备注</label>
          <input type="text" id="edit-order-note" placeholder="备注（少辣、多放盐…）" maxlength="100">
        </div>
        <button type="button" class="btn-primary" onclick="saveEditOrder(() => loadHistory())">保存</button>
      </div>
    </div>


  </div>

  <script src="js/app.js"></script>
  <script>
    (async function() {
      await checkAuth('user');
      if (await isAdmin()) {
        const entry = document.getElementById('admin-entry');
        if (entry) entry.style.display = 'block';
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/meal-order/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
